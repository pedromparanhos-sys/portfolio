<script>
// ── state ────────────────────────────────────────────────────────────────────
let snapshots=[], trades=[], totalDuration=0, globalMaxQty=0;
let sparkMin=0, sparkMax=1, sparkRange=1;
let isPlaying=false, currentTime=0, speed=1, lastRafTime=null, rafId=null;

const bookCanvas = document.getElementById('book-canvas');
const sparkCanvas = document.getElementById('spark-canvas');
const btnPlay   = document.getElementById('btn-play');
const progress  = document.getElementById('progress');
const timeDisp  = document.getElementById('time-disp');
const obiFill   = document.getElementById('obi-fill');
const obiNeedle = document.getElementById('obi-needle');
const obiVal    = document.getElementById('obi-val');
const errDiv    = document.getElementById('error');
const errMsg    = document.getElementById('err-msg');

// ── canvas helpers ────────────────────────────────────────────────────────────
function sizeCanvas(c) {
  const dpr=devicePixelRatio||1, r=c.getBoundingClientRect();
  c.width=Math.round(r.width*dpr); c.height=Math.round(r.height*dpr);
  const ctx=c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return [r.width, r.height];
}

// ── binary search ─────────────────────────────────────────────────────────────
function snapAt(t) {
  let lo=0, hi=snapshots.length-1;
  while(lo<hi){const m=(lo+hi+1)>>1; if(snapshots[m].t<=t) lo=m; else hi=m-1;}
  return lo;
}

// ── color helpers ─────────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t}
function lerpColor(r1,g1,b1,r2,g2,b2,t){
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`
}

// ── book render ───────────────────────────────────────────────────────────────
function renderBook(snap) {
  const ctx=bookCanvas.getContext('2d');
  const [W,H]=sizeCanvas(bookCanvas);
  ctx.clearRect(0,0,W,H);

  const N=Math.min(snap.bids.length, snap.asks.length, 10);
  if(N===0) return;

  const PAD_LEFT=62, PAD_RIGHT=62, PAD_TOP=8, PAD_BOT=8;
  const rowH=(H-PAD_TOP-PAD_BOT)/Math.max(N,1);
  const centerX=W/2;
  const MAX_BAR=(W/2)-PAD_LEFT-4;

  // center dashed line
  ctx.save();
  ctx.setLineDash([3,4]);
  ctx.strokeStyle='#396a3d';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(centerX,PAD_TOP); ctx.lineTo(centerX,H-PAD_BOT); ctx.stroke();
  ctx.restore();

  // mid label at top
  ctx.fillStyle='#90d596';
  ctx.font='10px Geist Mono,ui-monospace,monospace';
  ctx.textAlign='center';
  ctx.fillText(snap.mid.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}), centerX, PAD_TOP+10);

  for(let i=0;i<N;i++){
    const y=PAD_TOP+i*rowH;
    const [bp,bq]=snap.bids[i]||[0,0];
    const [ap,aq]=snap.asks[i]||[0,0];

    const bidW=Math.max(1,(bq/globalMaxQty)*MAX_BAR);
    const askW=Math.max(1,(aq/globalMaxQty)*MAX_BAR);

    // bid bar (left of center)
    const bidGrad=ctx.createLinearGradient(centerX-bidW, 0, centerX, 0);
    bidGrad.addColorStop(0,'rgba(35,179,179,0.18)');
    bidGrad.addColorStop(1,'rgba(35,179,179,0.72)');
    ctx.fillStyle=bidGrad;
    ctx.fillRect(centerX-bidW, y+1, bidW, rowH-2);

    // ask bar (right of center)
    const askGrad=ctx.createLinearGradient(centerX, 0, centerX+askW, 0);
    askGrad.addColorStop(0,'rgba(221,92,49,0.72)');
    askGrad.addColorStop(1,'rgba(221,92,49,0.18)');
    ctx.fillStyle=askGrad;
    ctx.fillRect(centerX, y+1, askW, rowH-2);

    // price labels
    ctx.font=`${Math.min(11,rowH*0.55)}px Geist Mono,ui-monospace,monospace`;
    ctx.fillStyle='#23b3b3';
    ctx.textAlign='right';
    ctx.fillText(bp.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}), centerX-bidW-3, y+rowH/2+4);

    ctx.fillStyle='#dd5c31';
    ctx.textAlign='left';
    ctx.fillText(ap.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}), centerX+askW+3, y+rowH/2+4);

    // qty labels (small, inside bar if wide enough)
    ctx.font=`9px Geist Mono,ui-monospace,monospace`;
    ctx.fillStyle='rgba(252,253,252,0.55)';
    if(bidW>28){ctx.textAlign='left'; ctx.fillText(bq.toFixed(3), centerX-bidW+3, y+rowH/2+3);}
    if(askW>28){ctx.textAlign='right'; ctx.fillText(aq.toFixed(3), centerX+askW-3, y+rowH/2+3);}
  }
}

// ── sparkline render ──────────────────────────────────────────────────────────
function renderSpark(currentT) {
  const ctx=sparkCanvas.getContext('2d');
  const [W,H]=sizeCanvas(sparkCanvas);
  ctx.clearRect(0,0,W,H);

  if(snapshots.length<2) return;

  const PL=10,PR=10,PT=14,PB=18;
  const iW=W-PL-PR, iH=H-PT-PB;

  function toX(t){return PL+((t/totalDuration)*iW);}
  function toY(mid){return PT+iH-(((mid-sparkMin)/sparkRange)*iH);}

  // grid lines
  ctx.strokeStyle='#2a462d'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PT+i*(iH/4);
    ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(W-PR,y); ctx.stroke();
  }

  // time ticks every 30s
  ctx.fillStyle='#90d596'; ctx.font='9px Geist Mono,ui-monospace,monospace'; ctx.textAlign='center';
  for(let t=0;t<=totalDuration;t+=30000){
    const x=toX(t);
    ctx.fillText((t/1000).toFixed(0)+'s', x, H-4);
    ctx.strokeStyle='#396a3d'; ctx.beginPath(); ctx.moveTo(x,H-PB); ctx.lineTo(x,H-PB+3); ctx.stroke();
  }

  // Y labels
  ctx.textAlign='right'; ctx.fillStyle='#90d596';
  for(let i=0;i<=4;i++){
    const frac=i/4;
    const val=sparkMin+frac*sparkRange;
    ctx.fillText(val.toLocaleString('en-US',{maximumFractionDigits:0}), PL-2, PT+iH-frac*iH+3);
  }

  // build path up to currentT
  const cutIdx=snapAt(currentT);
  if(cutIdx<1) return;

  // area fill
  ctx.beginPath();
  ctx.moveTo(toX(snapshots[0].t), toY(snapshots[0].mid));
  for(let i=1;i<=cutIdx;i++) ctx.lineTo(toX(snapshots[i].t), toY(snapshots[i].mid));
  ctx.lineTo(toX(snapshots[cutIdx].t), PT+iH);
  ctx.lineTo(toX(snapshots[0].t), PT+iH);
  ctx.closePath();
  const areaGrad=ctx.createLinearGradient(0,PT,0,PT+iH);
  areaGrad.addColorStop(0,'rgba(144,245,61,0.22)');
  areaGrad.addColorStop(1,'rgba(144,245,61,0.01)');
  ctx.fillStyle=areaGrad;
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(toX(snapshots[0].t), toY(snapshots[0].mid));
  for(let i=1;i<=cutIdx;i++) ctx.lineTo(toX(snapshots[i].t), toY(snapshots[i].mid));
  ctx.strokeStyle='#90f53d'; ctx.lineWidth=1.5; ctx.lineJoin='round';
  ctx.stroke();

  // future dim line
  if(cutIdx<snapshots.length-1){
    ctx.beginPath();
    ctx.moveTo(toX(snapshots[cutIdx].t), toY(snapshots[cutIdx].mid));
    for(let i=cutIdx+1;i<snapshots.length;i++) ctx.lineTo(toX(snapshots[i].t), toY(snapshots[i].mid));
    ctx.strokeStyle='rgba(144,213,150,0.18)'; ctx.lineWidth=1;
    ctx.stroke();
  }

  // trade dots
  const r=3.5;
  for(const tr of trades){
    if(tr.t>currentT) break;
    const x=toX(tr.t), y=toY(tr.price);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=tr.side==='buy'?'rgba(35,179,179,0.9)':'rgba(221,92,49,0.9)';
    ctx.fill();
    ctx.strokeStyle='rgba(252,253,252,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
  }
}

// ── OBI update ────────────────────────────────────────────────────────────────
function updateOBI(obi) {
  const pct=((obi+1)/2*100).toFixed(1);
  obiNeedle.style.left=pct+'%';

  // fill from center
  const center=50;
  if(obi>=0){
    obiFill.style.left=center+'%';
    obiFill.style.width=(pct-center)+'%';
  } else {
    obiFill.style.left=pct+'%';
    obiFill.style.width=(center-parseFloat(pct))+'%';
  }

  // color interpolation: bid=green, zero=muted, ask=red
  let col;
  if(obi>=0) col=lerpColor(144,213,150, 35,179,179, obi);
  else col=lerpColor(144,213,150, 221,92,49, -obi);
  obiFill.style.background=col;
  obiVal.style.color=col;
  obiVal.textContent=(obi>=0?'+':'')+obi.toFixed(3);
}

// ── main render ───────────────────────────────────────────────────────────────
function render(t) {
  const idx=snapAt(t);
  const snap=snapshots[idx];
  renderBook(snap);
  renderSpark(t);
  updateOBI(snap.obi);

  progress.value=Math.round((t/totalDuration)*1000);
  timeDisp.textContent=(t/1000).toFixed(1)+'s';
}

// ── RAF loop ──────────────────────────────────────────────────────────────────
function tick(rafTime) {
  if(lastRafTime!==null) currentTime=Math.min(currentTime+(rafTime-lastRafTime)*speed, totalDuration);
  lastRafTime=rafTime;
  render(currentTime);
  if(isPlaying && currentTime<totalDuration){
    rafId=requestAnimationFrame(tick);
  } else if(currentTime>=totalDuration){
    isPlaying=false; btnPlay.textContent='▶'; lastRafTime=null;
  }
}

function play(){
  if(currentTime>=totalDuration) currentTime=0;
  isPlaying=true; btnPlay.textContent='⏸'; lastRafTime=null;
  rafId=requestAnimationFrame(tick);
}
function pause(){
  isPlaying=false; btnPlay.textContent='▶';
  if(rafId){cancelAnimationFrame(rafId); rafId=null;}
  lastRafTime=null;
}

btnPlay.addEventListener('click',()=>{ if(isPlaying) pause(); else play(); });

progress.addEventListener('input',()=>{
  currentTime=(parseInt(progress.value)/1000)*totalDuration;
  render(currentTime);
});

document.querySelectorAll('.sp-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    speed=parseFloat(b.dataset.speed);
    document.querySelectorAll('.sp-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  });
});

// ── resize ────────────────────────────────────────────────────────────────────
const ro=new ResizeObserver(()=>{ if(snapshots.length) render(currentTime); });
ro.observe(bookCanvas.parentElement);
ro.observe(sparkCanvas.parentElement);
